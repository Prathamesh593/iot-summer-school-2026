name: Count Arduino Files

# Trigger the workflow every time code is pushed to the repository
on: [push]

jobs:
  count-files:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code so the runner can see the files
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Step 2: Set up a Python environment on the virtual runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # Step 3: Run the counting script
    - name: Run .ino File Counter Script
      run: python scripts/count_ino.py
